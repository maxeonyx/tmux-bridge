name: Pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/pages.yml
      - docs/index.html
      - docs/CNAME
      - docs/SKILL.md
      - docs/*.sh
      - docs/schema/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare site content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf _site
          mkdir -p _site/releases
          cp -R docs/. _site/
          gh release download --repo "$GITHUB_REPOSITORY" --pattern "*" --dir _site/releases || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
