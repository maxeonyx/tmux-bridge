name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce version bump on new main commits
        run: |
          code_paths='Cargo.toml Cargo.lock src tests scripts docs'

          if ! git diff --quiet HEAD^ HEAD -- $code_paths; then
            code_changed=true
          else
            code_changed=false
          fi

          tag="$(python - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as cargo_toml:
              version = tomllib.load(cargo_toml)["package"]["version"]

          print(f"v{version}")
          PY
          )"

          if [ "$code_changed" = true ] && git rev-parse --verify --quiet "${tag}^{commit}" >/dev/null; then
            tag_commit="$(git rev-parse "${tag}^{commit}")"
            head_commit="$(git rev-parse HEAD)"

            if [ "$tag_commit" != "$head_commit" ]; then
              echo "Cargo.toml version ${tag#v} already has git tag $tag at $tag_commit, but HEAD is $head_commit."
              echo "Code changed on main without a new version bump. Every code change should produce a new release."
              exit 1
            fi
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install tmux and fish
        run: sudo apt-get update && sudo apt-get install -y tmux fish

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run test ratchet
        run: python3 scripts/ratchet.py

      - name: Check status file unchanged
        run: |
          if ! git diff --exit-code .test-status.json; then
            echo "::error::Test status changed. Commit the updated .test-status.json"
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tb
            asset: tb-x86_64-linux
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: tb.exe
            asset: tb-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read version from Cargo.toml
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("Cargo.toml", "rb") as cargo_toml:
              version = tomllib.load(cargo_toml)["package"]["version"]

          print(f"tag=v{version}")
          PY

      - name: Recreate release for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git push origin ":refs/tags/$tag"
          fi

          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --target "$GITHUB_SHA" \
            artifacts/*/*

  pages:
    name: Pages
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare site content
        run: |
          rm -rf _site
          mkdir -p _site/releases
          cp -R docs/. _site/
          cp artifacts/*/* _site/releases/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
