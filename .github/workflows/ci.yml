name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run test ratchet
        run: python3 scripts/ratchet.py

      - name: Check status file unchanged
        run: |
          if ! git diff --exit-code .test-status.json; then
            echo "::error::Test status changed. Commit the updated .test-status.json"
            exit 1
          fi

  release:
    needs: ratchet
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tb
            asset_name: tb-x86_64-linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: tb
            asset_name: tb-x86_64-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: tb
            asset_name: tb-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tb
            asset_name: tb-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tb
            asset_name: tb-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tb.exe
            asset_name: tb-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install AArch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tb-x86_64-linux/tb-x86_64-linux
            artifacts/tb-x86_64-linux-musl/tb-x86_64-linux-musl
            artifacts/tb-aarch64-linux/tb-aarch64-linux
            artifacts/tb-x86_64-macos/tb-x86_64-macos
            artifacts/tb-aarch64-macos/tb-aarch64-macos
            artifacts/tb-x86_64-windows.exe/tb-x86_64-windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
